server {
  listen 80;
  server_name crm.teleset.local;

  access_log /var/log/nginx/crm.access.log;
  error_log /var/log/nginx/crm.error.log;

  root /var/www/lbackend/current/public;

  gzip on;
  gzip_disable "msie6";
  gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;

  location / {
    try_files $uri $uri/index.html $uri/index.htm @crm_backend;
  }

  location @crm_backend {
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_redirect off;
    proxy_read_timeout 300;
    proxy_pass http://web.local;
  }
}
