#  location ~* ".*?\.(ico|css|js|gif|jpg|jpeg|png|doc|pdf|woff2|svg)(\?[0-9]*)?$" {
  location ~ ^/frontend/(img|fonts)/ {
    expires 24h;
    #expires max;
    proxy_cache_valid  200 302  60m;
    proxy_cache_valid  404      1m;
    break;
  }
  error_page 500 502 503 504 /50x.html;

}
